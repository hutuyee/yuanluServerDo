on:
  release:
    types:
      - "published"

name: Upload Release Asset

jobs:
  build:
    name: Upload Release Asset
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - uses: actions/checkout@v4

      - name: Get release
        id: get_release
        uses: bruceadams/get-release@v1.2.3
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set release version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"
          echo "Maven version: ${VERSION}"

      - name: Build with Maven
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mvn -B versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false
          mvn -B package --file pom.xml

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "${{ github.event.release.tag_name }}" \
            "./yuanluServerDo-bukkit/target/yuanluServerDo-bukkit-${VERSION}.jar" \
            "./yuanluServerDo-bukkit-bungeecord/target/yuanluServerDo-bukkit-bungeecord-${VERSION}.jar" \
            "./yuanluServerDo-bukkit-velocity/target/yuanluServerDo-bukkit-velocity-${VERSION}.jar" \
            "./yuanluServerDo-bungeecord/target/yuanluServerDo-bungeecord-${VERSION}.jar" \
            "./yuanluServerDo-velocity/target/yuanluServerDo-velocity-${VERSION}.jar" \
            --repo "${{ github.repository }}"
